<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: dark navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#172531;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000101;stop-opacity:1" />
    </linearGradient>
    <!-- Lightning bolt gradient: gold -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" style="stop-color:#F3BD68;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#C7843B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C7843B;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner shadow on bolt -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Rounded square clip -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Subtle background glow behind bolt -->
  <ellipse cx="512" cy="512" rx="260" ry="340" fill="#C7843B" opacity="0.08" filter="url(#glow)"/>

  <!-- Lightning bolt shape - bold, centered, iconic -->
  <!-- Top right to middle, then bottom left — classic thunder bolt -->
  <polygon
    points="
      600,100
      340,530
      490,530
      424,924
      684,440
      530,440
      600,100
    "
    fill="url(#boltGrad)"
    filter="url(#glow)"
    clip-path="url(#roundedClip)"
  />

  <!-- Thin highlight line on bolt edge for depth -->
  <polygon
    points="
      600,100
      340,530
      390,530
      580,210
      600,100
    "
    fill="#F3BD68"
    opacity="0.35"
    clip-path="url(#roundedClip)"
  />

  <!-- Border ring - subtle gold -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="#C7843B" stroke-width="18" opacity="0.35"/>
</svg>
